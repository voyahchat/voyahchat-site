name: Password Update

on:
  repository_dispatch:
    types: [password-updated]

jobs:
  password-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --no-audit --no-fund

    - name: Fetch voyahchat-content hash
      id: hash
      run: |
        hash=$(git ls-remote https://github.com/voyahchat/voyahchat-content.git HEAD 2>/dev/null | cut -f1 | head -c7)
        echo "content=$hash" >> $GITHUB_OUTPUT

    - name: Restore voyahchat-content cache
      id: cache-content
      uses: actions/cache/restore@v4
      with:
        path: external/voyahchat-content
        key: content-${{ steps.hash.outputs.content }}

    - name: Clone voyahchat-content
      if: steps.cache-content.outputs.cache-hit != 'true'
      run: |
        mkdir -p external
        git clone https://github.com/voyahchat/voyahchat-content.git external/voyahchat-content
        cd external/voyahchat-content && git pull && git lfs pull

    - name: Save voyahchat-content cache
      if: steps.cache-content.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: external/voyahchat-content
        key: content-${{ steps.hash.outputs.content }}

    - name: Build site
      run: npm run build

    - name: Deploy password update
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USER }}
        FTP_PASS: ${{ secrets.FTP_PASS }}
        FTP_PATH: ${{ secrets.FTP_PATH }}
      run: npm run deploy
