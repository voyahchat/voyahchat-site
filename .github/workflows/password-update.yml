name: Password Update

on:
  repository_dispatch:
    types: [password-updated]

jobs:
  password-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        lfs: true
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --no-audit --no-fund

    - name: Fetch repository hashes
      id: hash
      run: |
        fetch_hash() {
          local url=$1
          local hash
          hash=$(git ls-remote "$url" HEAD 2>/dev/null | cut -f1 | head -c7)
          if [ -z "$hash" ]; then
            echo "::warning::Failed to fetch hash from $url"
            echo "unknown"
          else
            echo "$hash"
          fi
        }

        echo "content=$(fetch_hash https://github.com/voyahchat/voyahchat-content.git)" >> $GITHUB_OUTPUT
        echo "adaptive=$(fetch_hash https://github.com/vithar/adaptive-layout.git)" >> $GITHUB_OUTPUT

    - name: Restore voyahchat-content cache
      id: cache-content
      uses: actions/cache/restore@v4
      with:
        path: external/voyahchat-content
        key: content-${{ steps.hash.outputs.content }}

    - name: Clone voyahchat-content
      if: steps.cache-content.outputs.cache-hit != 'true'
      run: |
        mkdir -p external
        git clone https://github.com/voyahchat/voyahchat-content.git external/voyahchat-content
        cd external/voyahchat-content && git pull && git lfs pull

    - name: Save voyahchat-content cache
      if: steps.cache-content.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: external/voyahchat-content
        key: content-${{ steps.hash.outputs.content }}

    - name: Restore adaptive-layout cache
      id: cache-adaptive
      uses: actions/cache/restore@v4
      with:
        path: external/adaptive-layout
        key: adaptive-${{ steps.hash.outputs.adaptive }}

    - name: Clone adaptive-layout
      if: steps.cache-adaptive.outputs.cache-hit != 'true'
      run: |
        mkdir -p external
        git clone https://github.com/vithar/adaptive-layout.git external/adaptive-layout
        cd external/adaptive-layout && git pull && git lfs pull

    - name: Save adaptive-layout cache
      if: steps.cache-adaptive.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: external/adaptive-layout
        key: adaptive-${{ steps.hash.outputs.adaptive }}

    - name: Fetch docs hash
      id: hash-docs
      run: |
        hash=$(git ls-remote https://github.com/voyahchat/voyahchat-docs.git HEAD 2>/dev/null | cut -f1 | head -c7)
        echo "docs=${hash:-unknown}" >> $GITHUB_OUTPUT

    - name: Restore voyahchat-docs cache
      id: cache-docs
      uses: actions/cache/restore@v4
      with:
        path: external/voyahchat-docs
        key: docs-v2-${{ steps.hash-docs.outputs.docs }}
        restore-keys: |
          docs-v2-
          docs-

    - name: Clone voyahchat-docs
      if: steps.cache-docs.outputs.cache-hit != 'true'
      run: |
        mkdir -p external
        if [ ! -d "external/voyahchat-docs/.git" ]; then
          git clone https://github.com/voyahchat/voyahchat-docs.git external/voyahchat-docs
        fi
        cd external/voyahchat-docs
        git pull || echo "Git pull failed, continuing..."
        git lfs pull

    - name: Save voyahchat-docs cache
      if: steps.cache-docs.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: external/voyahchat-docs
        key: docs-v2-${{ steps.hash-docs.outputs.docs }}

    - name: Fetch install hash
      id: hash-install
      run: |
        hash=$(git ls-remote https://github.com/voyahchat/voyahchat-install.git HEAD 2>/dev/null | cut -f1 | head -c7)
        echo "install=${hash:-unknown}" >> $GITHUB_OUTPUT

    - name: Restore voyahchat-install cache
      id: cache-install
      uses: actions/cache/restore@v4
      with:
        path: external/voyahchat-install
        key: install-v2-${{ steps.hash-install.outputs.install }}
        restore-keys: |
          install-v2-
          install-

    - name: Clone voyahchat-install
      if: steps.cache-install.outputs.cache-hit != 'true'
      run: |
        mkdir -p external
        if [ ! -d "external/voyahchat-install/.git" ]; then
          git clone https://github.com/voyahchat/voyahchat-install.git external/voyahchat-install || true
        fi
        mkdir -p external/voyahchat-install
        cd external/voyahchat-install
        git pull || echo "Git pull failed, continuing..."
        git lfs pull

    - name: Save voyahchat-install cache
      if: steps.cache-install.outputs.cache-hit != 'true'
      uses: actions/cache/save@v4
      with:
        path: external/voyahchat-install
        key: install-v2-${{ steps.hash-install.outputs.install }}

    - name: Build site
      run: npm run build

    - name: Deploy password update
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USER }}
        FTP_PASS: ${{ secrets.FTP_PASS }}
        FTP_PATH: ${{ secrets.FTP_PATH }}
      run: npm run deploy
