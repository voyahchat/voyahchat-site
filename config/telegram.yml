# Telegram configuration for VoyahChat downloader

# Chat username (without @)
chat: voyahchat

# Download settings with sensible defaults
download:
  # Retry configuration
  maxRetries: 10
  retryDelayBaseMs: 2000
  retryDelayMaxMs: 60000
  retryJitterMs: 1000

  # Timeout configuration
  timeoutBaseMs: 60000
  timeoutPerMbMs: 30000
  timeoutMaxMs: 600000

  # API configuration
  connectionRetries: 5
  connectionTimeoutMs: 30000
  messagesPerRequest: 100
  rateLimitDelayMs: 1000

