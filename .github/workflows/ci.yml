name: Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [content-updated]
  schedule:
    # Run every 6 days at 3:00 AM UTC to keep cache alive
    - cron: '0 3 */6 * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # ============================================
    # PHASE 1: Checkout
    # ============================================
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        lfs: true

    # ============================================
    # PHASE 2: Node.js Setup
    # ============================================
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci --no-audit --no-fund

    # ============================================
    # PHASE 3: External Repositories
    # ============================================
    - name: Fetch repository hashes
      id: hash
      run: |
        fetch_hash() {
          local url=$1
          local hash
          hash=$(git ls-remote "$url" HEAD 2>/dev/null | cut -f1 | head -c7)
          if [ -z "$hash" ]; then
            echo "::warning::Failed to fetch hash from $url"
            echo "unknown"
          else
            echo "$hash"
          fi
        }

        echo "content=$(fetch_hash https://github.com/voyahchat/voyahchat-content.git)" >> $GITHUB_OUTPUT
        echo "docs=$(fetch_hash https://github.com/voyahchat/voyahchat-docs.git)" >> $GITHUB_OUTPUT
        echo "install=$(fetch_hash https://github.com/voyahchat/voyahchat-install.git)" >> $GITHUB_OUTPUT
        echo "adaptive=$(fetch_hash https://github.com/vithar/adaptive-layout.git)" >> $GITHUB_OUTPUT

    # ============================================
    # PHASE 4: External Repositories with Cache
    # ============================================
    - name: Cache voyahchat-content
      id: cache-content
      uses: actions/cache@v4
      with:
        path: external/voyahchat-content
        key: content-${{ steps.hash.outputs.content }}
        restore-keys: |
          content-

    - name: Clone voyahchat-content
      if: steps.cache-content.outputs.cache-hit != 'true'
      run: |
        mkdir -p external
        git clone --depth 1 https://github.com/voyahchat/voyahchat-content.git external/voyahchat-content
        cd external/voyahchat-content && git pull && git lfs pull

    - name: Cache voyahchat-docs
      id: cache-docs
      uses: actions/cache@v4
      with:
        path: external/voyahchat-docs
        key: docs-${{ steps.hash.outputs.docs }}
        restore-keys: |
          docs-

    - name: Clone voyahchat-docs
      if: steps.cache-docs.outputs.cache-hit != 'true'
      run: |
        mkdir -p external
        git clone --depth 1 https://github.com/voyahchat/voyahchat-docs.git external/voyahchat-docs
        cd external/voyahchat-docs && git pull || echo "Git pull failed, continuing..." \
          && git lfs pull || echo "LFS pull failed, continuing without LFS files..."

    - name: Cache voyahchat-install
      id: cache-install
      uses: actions/cache@v4
      with:
        path: external/voyahchat-install
        key: install-${{ steps.hash.outputs.install }}
        restore-keys: |
          install-

    - name: Clone voyahchat-install
      if: steps.cache-install.outputs.cache-hit != 'true'
      run: |
        mkdir -p external
        git clone --depth 1 https://github.com/voyahchat/voyahchat-install.git \
          external/voyahchat-install || echo "Clone failed, creating empty directory..."
        if [ ! -d "external/voyahchat-install" ]; then
          mkdir -p external/voyahchat-install
        fi
        cd external/voyahchat-install && git pull || echo "Git pull failed, continuing..." \
          && git lfs pull || echo "LFS pull failed, continuing without LFS files..."

    - name: Cache adaptive-layout
      id: cache-adaptive
      uses: actions/cache@v4
      with:
        path: external/adaptive-layout
        key: adaptive-${{ steps.hash.outputs.adaptive }}
        restore-keys: |
          adaptive-

    - name: Clone adaptive-layout
      if: steps.cache-adaptive.outputs.cache-hit != 'true'
      run: |
        mkdir -p external
        git clone --depth 1 https://github.com/vithar/adaptive-layout.git external/adaptive-layout
        cd external/adaptive-layout && git pull && git lfs pull

    # ============================================
    # PHASE 5: Quality Checks
    # ============================================
    - name: Configure Git
      run: git config --global advice.defaultBranchName false

    - name: Setup CI environment
      run: npm run setup:ci

    - name: Run ESLint
      run: npm run lint

    - name: Run tests
      run: npm test

    # ============================================
    # PHASE 6: Build and Deploy
    # ============================================
    - name: Build site
      run: npm run build

    - name: Deploy to production
      if: |
        success() &&
        github.event_name != 'schedule' &&
        (github.ref == 'refs/heads/main' || github.event_name == 'repository_dispatch')
      env:
        FTP_HOST: ${{ secrets.FTP_HOST }}
        FTP_USER: ${{ secrets.FTP_USER }}
        FTP_PASS: ${{ secrets.FTP_PASS }}
        FTP_PATH: ${{ secrets.FTP_PATH }}
      run: npm run deploy

    # ============================================
    # PHASE 7: Metrics
    # ============================================
    - name: Log cache status
      if: always()
      run: |
        echo "## Cache Status" >> $GITHUB_STEP_SUMMARY
        echo "| Repository | Cache Hit |" >> $GITHUB_STEP_SUMMARY
        echo "|------------|-----------|" >> $GITHUB_STEP_SUMMARY
        echo "| voyahchat-content | ${{ steps.cache-content.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
        echo "| voyahchat-docs | ${{ steps.cache-docs.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
        echo "| voyahchat-install | ${{ steps.cache-install.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY
        echo "| adaptive-layout | ${{ steps.cache-adaptive.outputs.cache-hit }} |" >> $GITHUB_STEP_SUMMARY

    - name: Build metrics
      if: always()
      run: |
        echo "## Build Metrics" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        if [[ -d "external" ]]; then
          echo "- **External Directory Size**: $(du -sh external | cut -f1)" >> $GITHUB_STEP_SUMMARY
        fi
        if [[ -d "site" ]]; then
          echo "- **Build Output Size**: $(du -sh site | cut -f1)" >> $GITHUB_STEP_SUMMARY
        fi
